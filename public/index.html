<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>بابل AI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="إعدادات المحادثة">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">AI</div>
          <div>
            <h1>بابل AI</h1>
            <p>معرفة من أرض الحضارة</p>
          </div>
        </div>

        <section class="control-group">
          <div class="section-heading">
            <h2>سجل المحادثات</h2>
            <button id="new-chat" class="icon-button" type="button" aria-label="محادثة جديدة">+</button>
          </div>
          <div id="chat-list" class="chat-list" aria-label="سجل المحادثات"></div>
        </section>

        <section id="access-code-group" class="control-group">
          <h2>كود الوصول</h2>
          <div class="access-row">
            <input
              id="access-code"
              type="password"
              placeholder="أدخل الكود"
              autocomplete="current-password"
              dir="ltr"
            />
            <button id="save-access-code" class="secondary-button" type="button">حفظ</button>
          </div>
        </section>

        <section class="control-group">
          <h2>نمط الإجابة</h2>
          <div class="segmented" role="group" aria-label="نمط الإجابة">
            <button class="mode-button active" data-mode="balanced" type="button">متوازن</button>
            <button class="mode-button" data-mode="concise" type="button">مختصر</button>
            <button class="mode-button" data-mode="deep" type="button">عميق</button>
          </div>
        </section>

        <section class="control-group">
          <h2>التحكم</h2>
          <button id="copy-last" class="secondary-button" type="button">نسخ آخر رد</button>
          <button id="clear-chat" class="secondary-button danger" type="button">مسح المحادثة الحالية</button>
        </section>

        <section class="control-group small">
          <h2>الحالة</h2>
          <p id="status-text">جاهز للمحادثة.</p>
        </section>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">تطبيق مستقل</p>
            <h2>مساعد ذكي باسم بابل AI</h2>
          </div>
          <div id="model-badge" class="model-badge">النموذج: تلقائي</div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="chat-form" class="composer">
          <label class="sr-only" for="message-input">رسالتك</label>
          <textarea
            id="message-input"
            rows="1"
            placeholder="اكتب سؤالك هنا..."
            autocomplete="off"
            dir="auto"
          ></textarea>
          <button id="send-button" type="submit">إرسال</button>
        </form>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
